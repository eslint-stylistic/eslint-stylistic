ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - semver@6.3.1

packages:
  - docs
  - packages/*
  - shared

overrides:
  twoslash-eslint: 'catalog:docs'
  vite: 'catalog:dev'
  vitest: 'catalog:test'
  vue: 'catalog:docs'
  vue-tsc: 'catalog:dev'

catalogs:
  build:
    '@codecov/rollup-plugin': ^2.0.1
    tsdown: ^0.22.1
  dev:
    '@antfu/eslint-config': ^9.0.0
    '@antfu/eslint-define-config': 1.23.0-2
    '@antfu/utils': ^9.3.0
    '@eslint/core': ^1.2.1
    '@eslint/css': ^1.3.0
    '@eslint/markdown': ^8.0.2
    '@eslint/plugin-kit': ^0.7.2
    '@types/estree': ^1.0.9
    '@types/node': ^25.9.1
    '@types/picomatch': ^4.0.3
    '@types/semver': ^7.7.1
    '@typescript-eslint/parser': ^8.60.1
    '@typescript-eslint/utils': ^8.60.1
    bumpp: ^11.1.0
    change-case: ^5.4.4
    diff: ^9.0.0
    escape-string-regexp: ^5.0.0
    eslint: ^10.4.1
    eslint-plugin-eslint-plugin: ^7.4.0
    eslint-plugin-format: ^2.0.1
    gray-matter: ^4.0.3
    jiti: ^2.7.0
    json-schema-to-typescript-lite: ^15.0.0
    jsonc-eslint-parser: ^3.1.0
    nano-staged: ^1.0.2
    ohash: ^2.0.11
    oxfmt: ^0.53.0
    oxlint: 1.55.0
    semver: ^7.8.1
    simple-git: ^3.27.0
    simple-git-hooks: ^2.13.1
    taze: ^19.14.1
    tinyexec: ^1.2.4
    tinyglobby: ^0.2.17
    tsx: ^4.22.4
    typescript: ^6.0.3
    vite: ^8.0.16
    vue-tsc: ^3.3.3
  docs:
    '@iconify-json/carbon': ^1.2.22
    '@iconify-json/ri': ^1.2.10
    '@shikijs/transformers': ^4.1.0
    '@shikijs/twoslash': ^4.1.0
    '@shikijs/vitepress-twoslash': ^4.1.0
    '@types/markdown-it-container': ^4.0.0
    '@vueuse/core': ^14.3.0
    fuse.js: ^7.4.1
    markdown-it-container: ^4.0.0
    oxc-minify: ^0.134.0
    shiki: ^4.1.0
    twoslash: ^0.3.8
    twoslash-eslint: ^0.3.8
    unocss: ^66.7.0
    unplugin-vue-components: ^32.1.0
    vitepress: ^2.0.0-alpha.17
    vue: ^3.5.35
  prod:
    '@eslint-community/eslint-utils': ^4.9.1
    '@typescript-eslint/types': ^8.60.1
    '@typescript-eslint/visitor-keys': ^8.60.1
    espree: ^11.2.0
    picomatch: ^4.0.4
  test:
    '@babel/eslint-parser': ^7.29.7
    '@babel/plugin-syntax-decorators': ^7.29.7
    '@babel/plugin-syntax-do-expressions': ^7.29.7
    '@babel/plugin-syntax-function-bind': ^7.29.7
    '@babel/preset-react': ^7.29.7
    '@vitest/coverage-v8': ^4.1.8
    '@vitest/ui': ^4.1.8
    eslint-vitest-rule-tester: ^3.1.0
    vitest: ^4.1.8
    vue-eslint-parser: ^10.4.0

allowBuilds:
  esbuild: false
  simple-git-hooks: true
