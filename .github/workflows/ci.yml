name: CI

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main
      - dev

  merge_group: {}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JS
        uses: sxzz/workflows/setup-js@69098296b6f6083ed99f38e2040f2a7238580e27 # v1.4.0

      - name: Typecheck
        run: pnpm run typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JS
        uses: sxzz/workflows/setup-js@69098296b6f6083ed99f38e2040f2a7238580e27 # v1.4.0

      - name: Build
        run: pnpm run build

      - name: Cache dist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          retention-days: 3
          name: dist
          path: packages/*/dist

  test:
    runs-on: ${{ matrix.os }}
    needs:
      - build
    strategy:
      matrix:
        node: [lts/*]
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - node: 20.x
            os: ubuntu-latest
      fail-fast: false

    steps:
      - name: Setup JS
        uses: sxzz/workflows/setup-js@69098296b6f6083ed99f38e2040f2a7238580e27 # v1.4.0
        with:
          node-version: ${{ matrix.node }}

      - name: Restore dist cache
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: packages

      - name: Test
        run: pnpm run test
        if: ${{ matrix.node != 'lts/*' || matrix.os != 'ubuntu-latest' }}

      - name: Test with coverage
        run: pnpm run test --coverage
        if: ${{ matrix.node == 'lts/*' && matrix.os == 'ubuntu-latest' }}

      - name: Report coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: ${{ matrix.node == 'lts/*' && matrix.os == 'ubuntu-latest' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Fixtures
        run: pnpm run test:fixtures

  test-eslint9:
    runs-on: ubuntu-slim
    needs:
      - build
    steps:
      - name: Setup JS
        uses: sxzz/workflows/setup-js@69098296b6f6083ed99f38e2040f2a7238580e27 # v1.4.0

      - run: pnpm install eslint@9 -D

      - name: Restore dist cache
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: packages

      - name: Test
        run: pnpm run test

      - name: Fixtures
        run: pnpm run test:fixtures
